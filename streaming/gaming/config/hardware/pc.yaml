# =============================================================================
# PC Hardware Config (Windows)
# =============================================================================

capture:
  target_fps: 60
  width: 1920
  height: 1080
  format: bgr
  # Use DXcam for DXGI capture
  source: pc_dxcam

input:
  controller_type: vgamepad
  deadzone: 0.05

vision:
  input_size: [224, 224]
  snapshot_interval_frames: 10
  # NitroGen on GPU0
  device: "cuda:0"

comms:
  bridge_type: local  # Same machine, different GPUs
  queue_maxsize: 64

timing:
  main_loop_fps: 60
  director_fps: 6
