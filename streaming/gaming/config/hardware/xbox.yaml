# =============================================================================
# Xbox Hardware Config (Magewell capture + Titan Two input)
# =============================================================================

capture:
  target_fps: 60
  width: 1920
  height: 1080
  format: bgr
  source: magewell

input:
  controller_type: titan_two
  port: "/dev/ttyUSB0"
  baudrate: 115200
  deadzone: 0.08

vision:
  input_size: [224, 224]
  snapshot_interval_frames: 10
  device: "cuda:0"

comms:
  # Xbox capture PC → Alice brain PC over socket
  bridge_type: socket
  socket_host: "192.168.1.100"
  socket_port: 9500
  queue_maxsize: 32

timing:
  main_loop_fps: 60
  director_fps: 6
